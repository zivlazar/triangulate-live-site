<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Approve event | Triangulate</title>
    <meta name="description" content="Admin confirmation page for Triangulate event approvals." />
    <meta name="theme-color" content="#1d7ce4" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="./assets/app/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #F8FAFC;
        color: #0A3172;
        margin: 0;
        padding: 40px 20px;
        min-height: 100vh;
        box-sizing: border-box;
      }
      .card {
        max-width: 520px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #E2E8F0;
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 8px 24px rgba(10, 49, 114, 0.08);
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px 0;
        letter-spacing: -0.3px;
      }
      .lede {
        color: #475569;
        margin: 0 0 16px 0;
      }
      .details {
        background: #F8FAFC;
        border: 1px solid #E2E8F0;
        border-radius: 8px;
        padding: 16px;
        margin: 12px 0 20px 0;
      }
      .details p {
        margin: 0 0 6px 0;
        line-height: 1.6;
        color: #1F2937;
      }
      button {
        border: 0;
        padding: 14px 28px;
        border-radius: 999px;
        font-weight: 900;
        font-size: 15px;
        letter-spacing: 0.5px;
        cursor: pointer;
        font-family: inherit;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-approve { background: #B9F246; color: #0A3172; }
      .btn-reject { background: #EF4444; color: #ffffff; }
      .cancel {
        display: inline-block;
        margin-left: 12px;
        color: #64748B;
        text-decoration: none;
        font-size: 14px;
      }
      .footnote {
        color: #64748B;
        font-size: 12px;
        margin-top: 18px;
      }
      .back {
        display: inline-block;
        background: #B9F246;
        color: #0A3172;
        padding: 12px 24px;
        border-radius: 999px;
        font-weight: 900;
        text-decoration: none;
        letter-spacing: 0.5px;
        margin-top: 8px;
      }
      .success h1 { color: #0A3172; }
      .error h1 { color: #B91C1C; }
    </style>
  </head>
  <body>
    <div id="root" class="card">
      <h1 id="title">Loading…</h1>
      <p class="lede" id="lede">One moment.</p>
    </div>

    <script type="module">
      const GAME_SUPABASE_URL = 'https://rgczribfoutvpashjgrx.supabase.co'
      const GAME_SUPABASE_ANON_KEY =
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJyZ2N6cmliZm91dHZwYXNoamdyeCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzc2MDExMzIyLCJleHAiOjIwOTE1ODczMjJ9.sAp2ao4iH8xeV9Q-MvYBfhK9T8NSbe_D61e127VWAiE'

      const FUNCTION_URL = GAME_SUPABASE_URL + '/functions/v1/event-approval-confirm'
      const SUPABASE_ANON_KEY = GAME_SUPABASE_ANON_KEY

      const root = document.getElementById('root')

      function escapeHtml(s) {
        return String(s ?? '')
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
      }

      function render(html, className) {
        root.className = 'card' + (className ? ' ' + className : '')
        root.innerHTML = html
      }

      function showError(title, message) {
        render(
          '<h1>' + escapeHtml(title) + '</h1>' +
          '<p class="lede">' + escapeHtml(message) + '</p>' +
          '<p><a class="back" href="https://triangulate.live">Back to Triangulate</a></p>',
          'error'
        )
      }

      function showSuccess(title, message) {
        render(
          '<h1>' + escapeHtml(title) + '</h1>' +
          '<p class="lede">' + escapeHtml(message) + '</p>' +
          '<p><a class="back" href="https://triangulate.live">Back to Triangulate</a></p>',
          'success'
        )
      }

      async function callApi(action, token) {
        const res = await fetch(FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ action: action, token: token }),
        })
        let data
        try { data = await res.json() } catch { data = {} }
        return { ok: res.ok && data && data.ok === true, data, status: res.status }
      }

      async function init() {
        const params = new URLSearchParams(location.search)
        const token = (params.get('token') || '').trim()
        const action = (params.get('action') || 'approve').toLowerCase()

        if (!token) {
          return showError('Missing token', 'The approval link is incomplete.')
        }
        if (action !== 'approve' && action !== 'reject') {
          return showError('Invalid action', 'Unknown action in the link.')
        }

        // Step 1: fetch event details with action=preview so the admin
        // can review before confirming. Nothing mutates on preview.
        const preview = await callApi('preview', token)
        if (!preview.ok) {
          const msg = preview.data && preview.data.error ? preview.data.error : 'Could not load event details.'
          return showError('Link issue', msg)
        }
        // Terminal states (already approved / already rejected / done etc.)
        // come back with ok=true, terminal=true — show the status message
        // instead of the confirm form since there's nothing left to decide.
        if (preview.data && preview.data.terminal) {
          return showSuccess(
            preview.data.title || 'Done',
            preview.data.message || 'This event has already been handled.'
          )
        }
        const ev = preview.data.event || {}
        const verb = action === 'approve' ? 'approve' : 'reject'
        const Verb = verb[0].toUpperCase() + verb.slice(1)
        const buttonClass = action === 'approve' ? 'btn-approve' : 'btn-reject'

        render(
          '<h1>' + Verb + ' this event?</h1>' +
          '<p class="lede">Review the details and confirm. Nothing changes until you tap the button.</p>' +
          '<div class="details">' +
            '<p><strong>Title:</strong> ' + escapeHtml(ev.title || 'Meet up') + '</p>' +
            '<p><strong>Host:</strong> ' + escapeHtml(ev.host || 'Someone') + '</p>' +
            '<p><strong>When:</strong> ' + escapeHtml(ev.scheduled || 'Whenever works') + '</p>' +
            (ev.plan_note ? '<p><strong>Note:</strong> ' + escapeHtml(ev.plan_note) + '</p>' : '') +
          '</div>' +
          '<button id="go" class="' + buttonClass + '" type="button">Yes, ' + verb + ' event</button>' +
          '<a class="cancel" href="https://triangulate.live">Cancel</a>' +
          '<p class="footnote">Two-step confirmation prevents accidental approvals from email scanners that auto-follow links.</p>'
        )

        document.getElementById('go').addEventListener('click', async function () {
          const btn = this
          btn.disabled = true
          btn.textContent = 'Working…'
          const result = await callApi(action, token)
          if (!result.ok) {
            const msg = result.data && result.data.error ? result.data.error : 'Something went wrong. Please try again.'
            return showError(action === 'approve' ? 'Approval failed' : 'Rejection failed', msg)
          }
          const info = result.data.message || ''
          if (action === 'approve') {
            showSuccess('Event approved', info || 'The event is now live and visible to everyone.')
          } else {
            showSuccess('Event rejected', info || 'The host will see it flagged as "Rejected by Admin" on their list.')
          }
        })
      }

      init().catch(function (err) {
        showError('Unexpected error', (err && err.message) || String(err))
      })
    </script>
  </body>
</html>
