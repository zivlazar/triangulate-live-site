project_id = "wnkbkgnydrmwgudbdqin"

[auth]
site_url = "https://triangulate.live"
additional_redirect_urls = [
  "https://triangulate.live/admin-social.html",
  "http://localhost:4173/admin-social.html",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[functions.social-publish-approved]
verify_jwt = true
